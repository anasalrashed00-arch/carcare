<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة سياراتي - النسخة المتقدمة</title>
    <!-- مكتبة لتصدير ملفات Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #fbbf24;
            --bg-site: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-site);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; height: 100vh;
            flex-direction: row; color: var(--text-main);
        }

        /* Sidebar & Navigation */
        .sidebar { width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 20px 0; border-left: 1px solid #334155; }
        .sidebar h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 22px; }
        .nav-item { padding: 12px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-muted); transition: 0.3s; font-size: 15px; }
        .nav-item.active { background: #334155; border-right: 4px solid var(--primary); color: var(--primary); }
        
        .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar-bg); justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; z-index: 1000; }
        .bottom-nav div { font-size: 20px; opacity: 0.6; color: white; }
        .bottom-nav div.active { color: var(--primary); opacity: 1; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; width: 100%; }
        .form-container { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; max-width: 900px; margin: 0 auto; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; color: var(--text-muted); }
        input, select { padding: 12px; border: 1px solid #475569; border-radius: 8px; background: var(--input-bg); color: white; outline: none; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-save { background: var(--primary); color: #0f172a; width: 100%; margin-top: 10px; }
        .btn-excel { background: #10b981; color: white; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; }

        /* Stats & Tables */
        .stat-card { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card span { display: block; font-size: 24px; font-weight: bold; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #475569; }
        th { color: var(--primary); }

        @media (max-width: 768px) {
            .sidebar { display: none; } .bottom-nav { display: flex; }
            body { flex-direction: column; } .main-content { padding: 15px 15px 100px; }
            .grid-inputs { grid-template-columns: 1fr; } .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>إدارة سياراتي</h2>
    <div class="nav-item" id="side-p1" onclick="showTab('p1')"><span>🚗</span> المركبة</div>
    <div class="nav-item" id="side-p2" onclick="showTab('p2')"><span>🔧</span> الصيانة</div>
    <div class="nav-item" id="side-p3" onclick="showTab('p3')"><span>📟</span> العداد</div>
    <div class="nav-item" id="side-p6" onclick="showTab('p6')"><span>⛽</span> استهلاك الوقود</div>
    <div class="nav-item" id="side-p4" onclick="showTab('p4')"><span>📊</span> الإحصائيات</div>
    <div class="nav-item" id="side-p5" onclick="showTab('p5')"><span>🗂️</span> السجل العام</div>
</aside>

<main class="main-content">
    <h2 id="view-title" style="color: var(--primary);">بيانات المركبة</h2>
    <div id="content-area" class="form-container"></div>
</main>

<nav class="bottom-nav">
    <div id="bot-p1" onclick="showTab('p1')">🚗</div>
    <div id="bot-p2" onclick="showTab('p2')">🔧</div>
    <div id="bot-p3" onclick="showTab('p3')">📟</div>
    <div id="bot-p6" onclick="showTab('p6')">⛽</div>
    <div id="bot-p5" onclick="showTab('p5')">🗂️</div>
</nav>

<script>
    // تهيئة البيانات
    let carData = JSON.parse(localStorage.getItem('carProfile')) || { type: '', model: '', year: '', plate: '', vin: '' };
    let maintenanceLogs = JSON.parse(localStorage.getItem('maintenanceLogs')) || [];
    let fuelLogs = JSON.parse(localStorage.getItem('fuelLogs')) || [];
    let currentOdo = localStorage.getItem('lastOdometer') || '000000';

    function showTab(tabId) {
        document.querySelectorAll('.nav-item, .bottom-nav div').forEach(i => i.classList.remove('active'));
        if(document.getElementById('side-' + tabId)) document.getElementById('side-' + tabId).classList.add('active');
        if(document.getElementById('bot-' + tabId)) document.getElementById('bot-' + tabId).classList.add('active');

        const area = document.getElementById('content-area');
        const title = document.getElementById('view-title');

        switch(tabId) {
            case 'p1':
                title.innerText = "بيانات المركبة";
                area.innerHTML = `<div class="grid-inputs">
                    <div class="input-group"><label>نوع المركبة</label><input type="text" id="v_type" value="${carData.type}"></div>
                    <div class="input-group"><label>الموديل</label><input type="text" id="v_model" value="${carData.model}"></div>
                    <div class="input-group"><label>السنة</label><input type="number" id="v_year" value="${carData.year}"></div>
                    <div class="input-group"><label>رقم اللوحة</label><input type="text" id="v_plate" value="${carData.plate}"></div>
                    <div class="input-group full-width"><label>رقم الهيكل (VIN)</label><input type="text" id="v_vin" value="${carData.vin}" placeholder="أدخل رقم الهيكل المكون من 17 رمز"></div>
                    <button class="btn btn-save full-width" onclick="saveVehicle()">حفظ البيانات</button>
                </div>`;
                break;

            case 'p6':
                title.innerText = "استهلاك الوقود";
                let fuelTotal = fuelLogs.reduce((s, i) => s + parseFloat(i.liters || 0), 0);
                area.innerHTML = `
                    <div class="grid-inputs" style="margin-bottom:20px;">
                        <div class="stat-card">إجمالي الليترات <span>${fuelTotal.toFixed(1)} L</span></div>
                        <div class="stat-card">مرات التعبئة <span>${fuelLogs.length}</span></div>
                    </div>
                    <div class="grid-inputs">
                        <div class="input-group"><label>نوع الوقود</label>
                            <select id="f_type"><option>بنزين 91</option><option>بنزين 95</option><option>ديزل</option></select>
                        </div>
                        <div class="input-group"><label>عدد الليترات</label><input type="number" id="f_liters"></div>
                        <div class="input-group full-width"><label>تاريخ التعبئة</label><input type="date" id="f_date"></div>
                        <button class="btn btn-save full-width" onclick="saveFuel()">تسجيل التعبئة</button>
                    </div>
                    <h3 style="margin-top:25px; color:var(--primary);">سجل الوقود</h3>
                    <table><thead><tr><th>التاريخ</th><th>النوع</th><th>الليترات</th></tr></thead>
                    <tbody>${fuelLogs.map(i => `<tr><td>${i.date}</td><td>${i.type}</td><td>${i.liters} L</td></tr>`).reverse().join('') || '<tr><td colspan="3">لا يوجد سجل</td></tr>'}</tbody></table>`;
                document.getElementById('f_date').valueAsDate = new Date();
                break;

            case 'p5':
                title.innerText = "السجل العام";
                area.innerHTML = `
                    <button class="btn btn-excel" onclick="exportToExcel()">📊 تصدير السجل إلى Excel</button>
                    <table><thead><tr><th>التاريخ</th><th>البيان</th><th>التكلفة/الكمية</th></tr></thead>
                    <tbody>
                        ${maintenanceLogs.map(i => `<tr style="border-right: 3px solid #fbbf24;"><td>${i.date}</td><td>صيانة: ${i.type}</td><td>${i.price} ريال</td></tr>`).join('')}
                        ${fuelLogs.map(i => `<tr style="border-right: 3px solid #10b981;"><td>${i.date}</td><td>وقود: ${i.type}</td><td>${i.liters} L</td></tr>`).join('')}
                    </tbody></table>`;
                break;
            
            // باقي التبويبات (صيانة، عداد، إحصائيات) يتم استدعاؤها بنفس المنطق السابق...
            default:
                area.innerHTML = `<p style="text-align:center; color:var(--text-muted);">جاري تحميل القسم...</p>`;
                if(tabId === 'p2') { 
                    title.innerText = "إضافة صيانة"; 
                    area.innerHTML = `<div class="grid-inputs"><div class="input-group"><label>نوع الصيانة</label><input type="text" id="m_type"></div><div class="input-group"><label>المبلغ</label><input type="number" id="m_price"></div><div class="input-group full-width"><label>التاريخ</label><input type="date" id="m_date"></div><button class="btn btn-save full-width" onclick="saveMaintenance()">حفظ</button></div>`;
                    document.getElementById('m_date').valueAsDate = new Date();
                }
                if(tabId === 'p3') {
                    title.innerText = "العداد";
                    area.innerHTML = `<div style="text-align:center; padding:20px; background:#000; border-radius:10px; margin-bottom:20px;"><div style="font-size:40px; color:var(--primary); font-family:monospace;">${currentOdo.padStart(6,'0')} KM</div></div><input type="number" id="odo_input" placeholder="القراءة الجديدة" style="width:100%; margin-bottom:10px;"><button class="btn btn-save" onclick="saveOdo()">تحديث</button>`;
                }
                if(tabId === 'p4') {
                    title.innerText = "الإحصائيات";
                    let totalM = maintenanceLogs.reduce((s,i)=>s+parseFloat(i.price||0),0);
                    area.innerHTML = `<div class="grid-inputs"><div class="stat-card">مصاريف الصيانة<span>${totalM} ريال</span></div><div class="stat-card">استهلاك الوقود<span>${fuelLogs.reduce((s,i)=>s+parseFloat(i.liters||0),0)} L</span></div></div>`;
                }
        }
    }

    // وظائف الحفظ
    function saveVehicle() {
        carData = { type: document.getElementById('v_type').value, model: document.getElementById('v_model').value, year: document.getElementById('v_year').value, plate: document.getElementById('v_plate').value, vin: document.getElementById('v_vin').value };
        localStorage.setItem('carProfile', JSON.stringify(carData));
        alert("تم حفظ بيانات المركبة بنجاح!");
    }

    function saveFuel() {
        let entry = { type: document.getElementById('f_type').value, liters: document.getElementById('f_liters').value, date: document.getElementById('f_date').value };
        fuelLogs.push(entry);
        localStorage.setItem('fuelLogs', JSON.stringify(fuelLogs));
        showTab('p6');
    }

    function saveMaintenance() {
        let log = { type: document.getElementById('m_type').value, price: document.getElementById('m_price').value, date: document.getElementById('m_date').value };
        maintenanceLogs.push(log);
        localStorage.setItem('maintenanceLogs', JSON.stringify(maintenanceLogs));
        showTab('p5');
    }

    function saveOdo() {
        let val = document.getElementById('odo_input').value;
        if(val) { currentOdo = val; localStorage.setItem('lastOdometer', val); showTab('p3'); }
    }

    // تصدير Excel
    function exportToExcel() {
        let data = maintenanceLogs.map(i => ({ "التاريخ": i.date, "النوع": "صيانة", "التفاصيل": i.type, "القيمة/الكمية": i.price + " ريال" }));
        fuelLogs.forEach(i => data.push({ "التاريخ": i.date, "النوع": "وقود", "التفاصيل": i.type, "القيمة/الكمية": i.liters + " L" }));
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "سجل السيارة");
        XLSX.writeFile(wb, "سجل_صيانة_السيارة.xlsx");
    }

    showTab('p1');
</script>
</body>
</html>
